<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laughing Man — Screen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    color: #00ffcc;
  }
  #container { position: relative; width: 100%; }
  video { display: none; }
  canvas { width: 100%; height: auto; display: block; }
  #ui {
    position: absolute; bottom: 12px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px; z-index: 10;
  }
  .btn {
    background: rgba(0,0,0,0.7); color: #00ffcc;
    border: 1px solid #00ffcc44; border-radius: 6px;
    padding: 8px 16px; font-family: 'Courier New', monospace;
    font-size: 13px; cursor: pointer;
  }
  .btn.stop { border-color: #ff4466aa; color: #ff4466; }
  #status { text-align: center; font-size: 12px; color: #00ffcc88; padding: 8px; }
  #start-screen {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; padding: 40px 20px; max-width: 480px; text-align: center;
  }
  .title { font-size: 22px; letter-spacing: 0.2em; color: #00ffcc; }
  .subtitle { font-size: 12px; color: #00ffcc55; letter-spacing: 0.15em; }
  .note { font-size: 12px; color: #00ffcc44; line-height: 1.8; }
  .start-btn {
    background: transparent; color: #00ffcc; border: 1px solid #00ffcc;
    border-radius: 8px; padding: 14px 32px; font-family: 'Courier New', monospace;
    font-size: 15px; cursor: pointer;
  }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<svg id="logo-static" xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 200 200" style="display:none">
  <circle cx="0" cy="0" r="98" fill="#001a14"/>
  <circle cx="0" cy="0" r="62" fill="#e8f5f0"/>
  <ellipse cx="-8" cy="-52" rx="48" ry="16" fill="#1a1a1a"/>
  <rect x="-42" y="-68" width="72" height="22" rx="8" fill="#1a1a1a"/>
  <ellipse cx="28" cy="-52" rx="22" ry="8" fill="#111"/>
  <ellipse cx="-12" cy="-22" rx="9" ry="7" fill="#1a1a1a"/>
  <ellipse cx="16" cy="-22" rx="9" ry="7" fill="#1a1a1a"/>
  <ellipse cx="-10" cy="-24" rx="3" ry="2.5" fill="#fff"/>
  <ellipse cx="18" cy="-24" rx="3" ry="2.5" fill="#fff"/>
  <path d="M4 -10 Q8 2 4 8" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M-22 18 Q0 38 22 18" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="0" cy="0" r="88" fill="none" stroke="#00e5cc" stroke-width="3"/>
  <circle cx="0" cy="0" r="78" fill="none" stroke="#00e5cc" stroke-width="1.5"/>
</svg>
<canvas id="logo-canvas" style="display:none"></canvas>

<div id="start-screen">
  <div class="title">LAUGHING MAN</div>
  <div class="subtitle">SCREEN OVERLAY SYSTEM</div>
  <button class="start-btn" id="startBtn" onclick="startCapture()" disabled>モデル読み込み中…</button>
  <div id="status">AIモデルを読み込んでいます</div>
  <div class="note">
    ボタンを押すとキャプチャする画面を選べます。<br>
    PCのChromeで動作します。
  </div>
</div>

<div id="container" style="display:none">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <button class="btn" onclick="toggleOverlay()">ロゴ ON/OFF</button>
    <button class="btn stop" onclick="stopCapture()">停止</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const status   = document.getElementById('status');
const startBtn = document.getElementById('startBtn');

// ロゴ準備
const svgEl  = document.getElementById('logo-static');
const svgStr = new XMLSerializer().serializeToString(svgEl);
const svgB64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
const logoImg = new Image();
logoImg.src = svgB64;
const offCanvas = document.getElementById('logo-canvas');
const offCtx    = offCanvas.getContext('2d');
const LOGO_SIZE = 400;
offCanvas.width  = LOGO_SIZE;
offCanvas.height = LOGO_SIZE;

let overlayEnabled = true;
let angle = 0;
let stream = null;
let frameCount = 0;
const faceStates = new Map();
let lastDetections = [];

// ロゴ描画
function buildLogoFrame() {
  offCtx.clearRect(0, 0, LOGO_SIZE, LOGO_SIZE);
  if (logoImg.complete) offCtx.drawImage(logoImg, 0, 0, LOGO_SIZE, LOGO_SIZE);
  offCtx.save();
  offCtx.translate(LOGO_SIZE/2, LOGO_SIZE/2);
  offCtx.rotate(angle);
  const text  = "I thought what I'd do was, I'd pretend I was one of those deaf-mutes. ";
  const chars = text.split('');
  const ringR = (LOGO_SIZE/2 - 4) * 0.9;
  const fs    = Math.max(10, LOGO_SIZE * 0.048);
  offCtx.font = `bold ${fs}px 'Courier New', monospace`;
  offCtx.fillStyle = '#fff';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  chars.forEach((char, i) => {
    const a = (i / chars.length) * Math.PI * 2 - Math.PI / 2;
    offCtx.save();
    offCtx.rotate(a);
    offCtx.translate(0, -ringR);
    offCtx.rotate(Math.PI / 2);
    offCtx.fillText(char, 0, 0);
    offCtx.restore();
  });
  offCtx.restore();
}

function drawLaughingMan(cx, cy, r) {
  buildLogoFrame();
  ctx.drawImage(offCanvas, cx - r, cy - r, r * 2, r * 2);
}

function drawGlitchEffect(cx, cy, r, progress) {
  ctx.save();
  ctx.translate(cx, cy);
  if (progress < 0.3) {
    const blocks = Math.floor(28 * (progress / 0.3));
    for (let i = 0; i < blocks; i++) {
      ctx.fillStyle = `rgba(0,229,204,${Math.random() * 0.9})`;
      ctx.fillRect((Math.random()-0.5)*r*2.2, (Math.random()-0.5)*r*2.2, Math.random()*r*0.55+r*0.05, Math.random()*r*0.1+r*0.02);
    }
    if (Math.random() > 0.3) {
      ctx.beginPath();
      ctx.arc(0, 0, r*(0.55+Math.random()*0.45), 0, Math.PI*2);
      ctx.strokeStyle = `rgba(0,229,204,${Math.random()*0.7})`;
      ctx.lineWidth = r*0.04;
      ctx.stroke();
    }
  } else if (progress < 0.65) {
    const t = (progress - 0.3) / 0.35;
    buildLogoFrame();
    [[0.18, 0.35*t],[0.12, 0.22*t]].forEach(([jit, alpha]) => {
      ctx.save();
      ctx.translate((Math.random()-0.5)*r*jit, (Math.random()-0.5)*r*jit);
      ctx.globalAlpha = alpha;
      ctx.drawImage(offCanvas, -r, -r, r*2, r*2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;
    for (let i = 0; i < 9; i++) {
      ctx.fillStyle = `rgba(0,229,204,${Math.random()*0.55})`;
      ctx.fillRect(-(Math.random()*r*1.8)/2, (Math.random()-0.5)*r*2.2, Math.random()*r*1.8, r*0.038);
    }
  } else {
    const t = (progress - 0.65) / 0.35;
    ctx.translate((Math.random()-0.5)*r*0.07*(1-t), (Math.random()-0.5)*r*0.07*(1-t));
    ctx.globalAlpha = 0.35 + t*0.65;
    buildLogoFrame();
    ctx.drawImage(offCanvas, -r, -r, r*2, r*2);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// モデル読み込み
async function loadModels() {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri('.');
    status.textContent = 'PCのChromeで動作します';
    startBtn.disabled = false;
    startBtn.textContent = '画面キャプチャを開始';
  } catch(e) {
    status.textContent = 'モデルの読み込みに失敗しました';
    console.error(e);
  }
}
loadModels();

// キャプチャ開始
window.startCapture = async function() {
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 30 } },
      audio: false
    });
  } catch(e) {
    status.textContent = 'キャンセルされました';
    return;
  }

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('container').style.display    = 'block';

  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;

  stream.getVideoTracks()[0].addEventListener('ended', stopCapture);

  // 顔検出を一定間隔で実行
  detectLoop();
  requestAnimationFrame(renderLoop);
};

window.stopCapture = function() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  lastDetections = [];
  faceStates.clear();
  document.getElementById('container').style.display    = 'none';
  document.getElementById('start-screen').style.display = 'flex';
};

// 検出ループ（200msごと）
async function detectLoop() {
  if (!stream) return;
  try {
    const dets = await faceapi.detectAllFaces(
      video,
      new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.2 })
    );
    lastDetections = dets;
  } catch(e) {}
  setTimeout(detectLoop, 200);
}

// 描画ループ（毎フレーム）
function renderLoop() {
  if (!stream) return;
  requestAnimationFrame(renderLoop);
  frameCount++;

  // 映像を描画
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // 前回の検出結果でロゴを描く
  if (overlayEnabled) {
    lastDetections.forEach((det, i) => {
      const box = det.box;
      const cx  = box.x + box.width  / 2;
      const cy  = box.y + box.height / 2;
      const r   = Math.max(box.width, box.height) * 0.65;

      if (!faceStates.has(i)) faceStates.set(i, { progress: 0 });
      const state = faceStates.get(i);

      if (state.progress >= 1) {
        drawLaughingMan(cx, cy, r);
      } else {
        state.progress = Math.min(1, state.progress + 0.015);
        drawGlitchEffect(cx, cy, r, state.progress);
      }
    });

    if (lastDetections.length === 0) faceStates.clear();
  }

  angle += 0.008;

  // スキャンエフェクト
  drawScanEffect();
}

// スキャンエフェクト
let scanY = 0;
let glitchTimer = 0;
function drawScanEffect() {
  const W = canvas.width, H = canvas.height;
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, y, W, 1);
  }
  scanY = (scanY + 2.5) % H;
  const grad = ctx.createLinearGradient(0, scanY-30, 0, scanY+30);
  grad.addColorStop(0,   'rgba(0,229,204,0)');
  grad.addColorStop(0.5, 'rgba(0,229,204,0.04)');
  grad.addColorStop(1,   'rgba(0,229,204,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, scanY-30, W, 60);
  glitchTimer++;
  if (glitchTimer > 180 && Math.random() > 0.97) {
    glitchTimer = 0;
    for (let i = 0; i < 4+Math.floor(Math.random()*4); i++) {
      ctx.fillStyle = `rgba(0,229,204,${0.2+Math.random()*0.4})`;
      ctx.fillRect(Math.random()*W*0.3, Math.random()*H, W*(0.4+Math.random()*0.6), 1+Math.random()*3);
    }
  }
}

window.toggleOverlay = function() { overlayEnabled = !overlayEnabled; };
</script>
</body>
</html>
